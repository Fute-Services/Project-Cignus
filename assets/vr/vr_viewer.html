<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cignus VR Offline Tour</title>
    <link rel="stylesheet" href="./pannellum.css">
    <script type="text/javascript" src="./pannellum.js"></script>
    <style>
        html, body, #panorama {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        .pnlm-load-box, .pnlm-lbox, .pnlm-loading-indicator {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
    var viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "dropoff",
            "autoLoad": true,
            "sceneFadeDuration": 500,
            "showControls": false,
            "mouseZoom": true,
            "autoRotate": 2,
            "autoRotateInactivityDelay": 5000
        },
        "scenes": {
            "dropoff": {
                "panorama": "./dropoff.webp",
                "yaw": -140
            },
            "dropoff_left": {
                "panorama": "./dropoff_left.webp",
                "yaw": 60
            },
            "dropoff_right": {
                "panorama": "./dropoff_right.webp",
                "yaw": -90
            },
            "reception": {
                "panorama": "./reception.webp",
                "pitch": -10
            },
            "cafeteria": {
                "panorama": "./cafeteria.webp",
                "pitch": -25
            },
            "liftlobby": {
                "panorama": "./liftlobby.webp",
                "pitch": 0
            },
            "top": {
                "panorama": "./top.webp",
                "pitch": -10
            }
        }
    });

    // Handle messages from React Native to switch scenes
    window.addEventListener('message', function(event) {
        var sceneId = event.data;
        if (sceneId && typeof sceneId === 'string') {
            viewer.loadScene(sceneId);
        }
    });
</script>

</body>
</html>
