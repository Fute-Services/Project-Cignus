name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the build from GitHub UI

permissions:
  contents: write # needed to upload the APK to a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # These two videos exceed GitHub's 100 MB blob limit so they live in
      # Git LFS; checkout leaves 132-byte pointer files behind. Fetch the
      # real files from the video-assets release (free, unlike LFS bandwidth).
      - name: Fetch large video assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download video-assets --repo "${{ github.repository }}" \
            --pattern "powai-walkthrough.mp4" \
            --output apps/mobile/assets/video/powai-walkthrough.mp4 --clobber
          gh release download video-assets --repo "${{ github.repository }}" \
            --pattern "cignus-drone-shot-home-page-v1-1080p.mp4" \
            --output apps/mobile/assets/video/cignus-drone-shot-home-page-v1-1080p.mp4 --clobber
          ls -la apps/mobile/assets/video/

      # The repo carries ~800 MB of video assets and the build needs ~15 GB
      # more for gradle + Metro; the stock runner disk overflowed without
      # this ("No space left on device").
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /opt/ghc /usr/local/share/boost /usr/share/swift "$AGENT_TOOLSDIRECTORY/CodeQL"
          sudo docker image prune --all --force > /dev/null
          df -h /

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android Native Directory
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      # AAPT2 times out crunching the 10-25 MB gallery PNGs on the 2-core
      # runner ("Compile ... timed out"); skip PNG optimization — the images
      # are shipped at full size anyway.
      - name: Disable PNG crunching
        working-directory: apps/mobile
        run: echo "android.enablePngCrunchInReleaseBuilds=false" >> android/gradle.properties

      # assembleRelease, not assembleDebug: a debug APK does not embed the JS
      # bundle (it needs a Metro dev server), so it cannot run standalone.
      # The Expo template signs release builds with the debug keystore, so
      # the output APK is directly installable.
      - name: Build Android Release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      # The APK is ~450 MB (bundled videos) — uploading it as an Actions
      # artifact would exhaust the 500 MB artifact quota of a private repo,
      # so publish it as a GitHub Release asset instead.
      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "build-${{ github.run_number }}" \
            "apps/mobile/android/app/build/outputs/apk/release/app-release.apk" \
            --target "${{ github.sha }}" \
            --title "Cignus APK build ${{ github.run_number }}" \
            --notes "Automated build of commit ${{ github.sha }}"
